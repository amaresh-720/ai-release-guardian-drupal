# Local development stack for the AI Release Guardian Drupal module.
# Fresh isolated env: own network, own containers, own volumes.
#
#   docker compose up -d --build
#   docker compose logs -f drupal
#   docker compose exec drupal bash
#   docker compose down            # stop
#   docker compose down -v         # full wipe (DB + uploaded files)

services:

  db:
    image: mariadb:10.11
    container_name: arg-db
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: ${DB_NAME:-drupal}
      MARIADB_USER: ${DB_USER:-drupal}
      MARIADB_PASSWORD: ${DB_PASSWORD:-drupal_dev_pw}
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root_dev_pw}
    volumes:
      - db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 30

  drupal:
    build:
      context: ./docker/drupal
    image: arg-drupal:local
    container_name: arg-drupal
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_NAME: ${DB_NAME:-drupal}
      DB_USER: ${DB_USER:-drupal}
      DB_PASSWORD: ${DB_PASSWORD:-drupal_dev_pw}
      DRUPAL_SITE_NAME: ${DRUPAL_SITE_NAME:-AI Release Guardian Demo}
      DRUPAL_ADMIN_USER: ${DRUPAL_ADMIN_USER:-admin}
      DRUPAL_ADMIN_PASSWORD: ${DRUPAL_ADMIN_PASSWORD:-admin}
      DRUPAL_ADMIN_EMAIL: ${DRUPAL_ADMIN_EMAIL:-admin@example.com}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GROQ_MODEL: ${GROQ_MODEL:-llama-3.1-8b-instant}
      GROQ_BASE_URL: ${GROQ_BASE_URL:-https://api.groq.com/openai/v1}
    ports:
      - "${HTTP_PORT:-8080}:80"
    volumes:
      - ./drupal-site:/var/www/html
      - ./scripts:/scripts:ro
      - drupal-files:/var/www/html/web/sites/default/files

volumes:
  db-data:
  drupal-files:
